[alembic]
script_location = alembic

sqlalchemy.url = postgresql+asyncpg://postgres:maryjesu99@localhost:5432/gdg_db

[loggers]
keys = root, sqlalchemysqla

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console

[logger_sqlalchemysqla]
level = WARN
handlers = console
qualname = sqlalchemysqla
propagate = 0

[handler_console]
class = StreamHandler
args = []
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s - %(levelname)s - %(message)s
